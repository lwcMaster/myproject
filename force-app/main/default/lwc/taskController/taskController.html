<template>
    <lightning-card title="Manual Load Tasks21">

        <div class="slds-p-around_medium slds-m-bottom_small">
            <lightning-combobox
                label="Status"
                value={status}
                options={statusOptions}
                onchange={handleStatusChange}>
            </lightning-combobox>
        </div>

        <div class="slds-m-top_small slds-m-left_medium">
            <lightning-button label="Load Tasks" onclick={handleLoad}></lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <ul>
                <template for:each={myStatusList} for:item="task">
                    <li key={task.Id}>
                        {task.Subject}
                    </li>
                </template>
            </ul>
        </div>

    </lightning-card>
</template>
