<template>
    <lightning-card title="Related Opportunities" icon-name="standard:opportunity">
        <div class="slds-var-m-around_medium">
            <template if:true={records}>
                <ul class="slds-list_dotted">
                    <template for:each={records} for:item="opp">
                        <li key={opp.id}>
                            <a onclick={navigateToOpp} data-id={opp.id}>
                                {opp.fields.Name.value}
                            </a> 
                            - {opp.fields.StageName.value}
                        </li>
                    </template>
                </ul>
            </template>
        </div>
    </lightning-card>
</template>
